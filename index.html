<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Запись онлайн</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
        }
        button {
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            padding: 12px 20px;
            margin: 5px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        button.service-btn {
            background: transparent;
            border: 2px solid var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-color, #40a7e3);
        }
        button.service-btn.selected {
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #fff);
        }
        input, select {
            width: 100%;
            padding: 12px;
            margin: 5px 0 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        .book-btn {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            margin-top: 20px;
        }
        #message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>📅 Онлайн запись</h1>
    
    <div id="user" style="margin-bottom: 20px; padding: 10px; background: var(--tg-theme-secondary-bg-color, #f0f0f0); border-radius: 10px;"></div>
    
    <h3>Выберите услугу:</h3>
    <div style="display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px;">
        <button class="service-btn" onclick="selectService('стрижка')" id="btn-стрижка">💇 Стрижка</button>
        <button class="service-btn" onclick="selectService('окрашивание')" id="btn-окрашивание">🎨 Окрашивание</button>

        <button class="service-btn" onclick="selectService('уход')" id="btn-уход">🧴 Уход</button>
    </div>
    
    <h3>Выберите дату:</h3>
    <input type="date" id="date" required>
    
    <h3>Выберите время:</h3>
    <select id="time" required>
        <option value="">-- Выберите время --</option>
        <option value="09:00">09:00</option>
        <option value="10:00">10:00</option>
        <option value="11:00">11:00</option>
        <option value="12:00">12:00</option>
        <option value="13:00">13:00</option>
        <option value="14:00">14:00</option>
        <option value="15:00">15:00</option>
        <option value="16:00">16:00</option>
        <option value="17:00">17:00</option>
        <option value="18:00">18:00</option>
    </select>
    
    <button class="book-btn" onclick="book()">📝 Записаться</button>
    
    <div id="message"></div>
