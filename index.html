<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Мое Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            text-align: center;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
        }
        button {
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Привет, это моё Mini App!</h1>
    <p>Данные пользователя Telegram:</p>
    <div id="user-info"></div>
    <button onclick="sendData()">Отправить данные в бота</button>

    <script>
        // Получаем объект Telegram WebApp
        const tg = window.Telegram.WebApp;
        
        // Сообщаем, что приложение готово
        tg.ready();
        
        // Разворачиваем на весь экран
        tg.expand();
        
        // Получаем информацию о пользователе
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-info').innerHTML = 
                Имя: ${user.first_name}<br>
                ID: ${user.id}<br>
                Язык: ${user.language_code}
            ;
        }
        
        // Функция отправки данных в бота
        function sendData() {
            const data = {
                action: 'button_clicked',
                time: new Date().toISOString()
            };
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
